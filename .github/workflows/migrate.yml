name: Deploy Migration

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm deployment'
        required: true
        default: 'NO'

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'YES' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run migration
        working-directory: contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          echo "Key length: ${#DEPLOYER_PRIVATE_KEY} chars"
          mkdir -p deployments
          forge script script/MigratePerpEngine.s.sol \
            --tc MigratePerpEngine \
            --rpc-url https://rpc.testnet.arc.network \
            --broadcast \
            --private-key "$DEPLOYER_PRIVATE_KEY" \
            -vvv

      - name: Show deployed addresses
        working-directory: contracts
        run: |
          echo "=== broadcast run-latest.json ==="
          cat broadcast/MigratePerpEngine.s.sol/5042002/run-latest.json || echo "broadcast file not found"

      - name: Upload broadcast
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts
          path: contracts/broadcast/
