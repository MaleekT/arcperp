name: Deploy Migration

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm deployment'
        required: true
        default: 'NO'
  push:
    branches:
      - run-migration

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/run-migration') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'YES')

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check secret is configured
        env:
          KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::DEPLOYER_PRIVATE_KEY secret is not set."
            exit 1
          fi
          echo "Key present (${#KEY} chars)"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Deploy fresh oracle feeds
        working-directory: contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p deployments
          forge script script/UpdateFeeds.s.sol \
            --tc UpdateFeeds \
            --rpc-url https://rpc.quicknode.testnet.arc.network \
            --broadcast \
            --private-key "$DEPLOYER_PRIVATE_KEY" \
            -vvv 2>&1

      - name: Extract and display deployed feed addresses
        working-directory: contracts
        run: |
          set -euo pipefail
          BROADCAST="broadcast/UpdateFeeds.s.sol/5042002/run-latest.json"

          if [ ! -f "$BROADCAST" ]; then
            echo "::error::Broadcast file not found — forge did not broadcast"
            exit 1
          fi

          FEEDS=$(jq -r '.transactions[] | select(.transactionType=="CREATE" and .contractName=="UpdatableMockFeed") | .contractAddress' "$BROADCAST")
          BTC_FEED=$(echo  "$FEEDS" | sed -n '1p')
          ETH_FEED=$(echo  "$FEEDS" | sed -n '2p')
          EURC_FEED=$(echo "$FEEDS" | sed -n '3p')

          echo "## Oracle Feeds Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "PerpEngine at \`0xdC07CBe108AaE0b83356CCc5a8FDB1e728418D4F\` now points to fresh feeds." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Feed | Address |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| UpdatableMockFeed (BTC) | \`$BTC_FEED\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| UpdatableMockFeed (ETH) | \`$ETH_FEED\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| UpdatableMockFeed (EURC) | \`$EURC_FEED\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Set these on Render (oracle-updater service)" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "MOCK_BTC_FEED=$BTC_FEED" >> "$GITHUB_STEP_SUMMARY"
          echo "MOCK_ETH_FEED=$ETH_FEED" >> "$GITHUB_STEP_SUMMARY"
          echo "MOCK_EURC_FEED=$EURC_FEED" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

          echo "BTC feed:  $BTC_FEED"
          echo "ETH feed:  $ETH_FEED"
          echo "EURC feed: $EURC_FEED"

      - name: Upload broadcast
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts
          path: contracts/broadcast/
