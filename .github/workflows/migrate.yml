name: Deploy Migration

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm deployment'
        required: true
        default: 'NO'

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'YES' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run migration
        working-directory: contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: |
          mkdir -p deployments
          forge script script/MigratePerpEngine.s.sol \
            --tc MigratePerpEngine \
            --rpc-url https://rpc.testnet.arc.network \
            --broadcast \
            --private-key $DEPLOYER_PRIVATE_KEY \
            -vvv

      - name: Commit deployment JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contracts/deployments/arc_testnet.json
          git commit -m "deploy: new contract addresses from migration" || echo "Nothing to commit"
          git push
