[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
fuzz = { runs = 10000 }

[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"

[etherscan]
arc_testnet = { key = "${ARC_ETHERSCAN_KEY}", url = "https://testnet.arcscan.app/api" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
